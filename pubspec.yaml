name: workout_timer
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  provider: ^6.1.1

  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  sqflite_common_ffi_web: ^0.4.0

  flutter_local_notifications: ^17.0.0

  permission_handler: ^11.3.0

  shared_preferences: ^2.2.2

  intl: ^0.19.0

  uuid: ^4.2.1

  google_fonts: ^6.2.1

  path: any
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

  integration_test:
    sdk: flutter

flutter:

  uses-material-design: true
 
  assets:
    - assets/icon.png

  fonts:
    - family: Orbitron
      fonts:
        - asset: fonts/Orbitron-Medium.ttf
          weight: 500

    - family: Rajdhani
      fonts:
        - asset: fonts/Rajdhani-Light-6.ttf
          weight: 300
        - asset: fonts/Rajdhani-Regular-2.ttf
          weight: 400
        - asset: fonts/Rajdhani-Medium-3.ttf
          weight: 500
        - asset: fonts/Rajdhani-SemiBold-5.ttf
          weight: 600
        - asset: fonts/Rajdhani-Bold-4.ttf
          weight: 700
